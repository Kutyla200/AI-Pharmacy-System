{% extends 'base.html' %}

{% block content %}

<h2>Medication Catalogue</h2>

<form method="GET" class="mb-4">

<div class="input-group">
<input type="text" name="q" class="form-control" placeholder="Search medication..." value="{{ query }}">
<button class="btn btn-primary">Search</button>
</div>

</form>

<div class="row">

{% for med in medications %}

<div class="col-md-4">

<div class="card mb-3">
<div class="card-body">

<h5 class="card-title">
<a href="/medication/{{ med.id }}">
{{ med.name }}
</a>
</h5>

<p>{{ med.description }}</p>

<p><strong>Price:</strong> R{{ med.price }}</p>

<p><strong>Stock:</strong> {{ med.stock }}</p>

<a href="/medication/{{ med.id }}" class="btn btn-primary">
View & Buy
</a>

</div>
</div>

</div>

{% endfor %}

</div>

{% endblock %}
