{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Online Pharmacy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<style>

.navbar-top{
    background:#0d6efd;
    padding:10px;
}

.logo{
    font-weight:bold;
    font-size:22px;
    color:white;
}

.search-bar{
    width:60%;
}

.icon-btn{
    font-size:20px;
    margin-left:15px;
    color:white;
    text-decoration:none;
}

.menu-bar{
    background:#f5f5f5;
    padding:10px;
}

.menu-bar a{
    margin-right:20px;
    text-decoration:none;
    font-weight:500;
    color:#333;
}

.banner{
    background:#e9f2ff;
    padding:60px;
    text-align:center;
    font-size:28px;
    margin-top:10px;
}

.products{
    margin-top:40px;
}

</style>

</head>


<body>

<!-- TOP NAVBAR -->
<div class="logo">
<a href="/dashboard" style="text-decoration:none;color:white;">
PHARMACY
</a>
</div>

<div class="navbar-top d-flex align-items-center justify-content-between">

<div class="logo">
 
    <a href="{% url 'dashboard' %}"
       class="d-flex align-items-center"
       style="color:white; text-decoration:none;">
 
        <!-- Logo Background -->
<div style="
            background:white;
            padding:4px 6px;
            border-radius:10px;
            display:flex;
            align-items:center;
            justify-content:center;
            margin-right:10px;
        ">
 
            <img src="{% static 'images/logo_icon.png' %}"
                 alt="SmartPharm Logo"
                 style="height:42px; width:auto; display:block;">
 
        </div>
 
        <!-- System Name -->
<span style="font-size:24px; font-weight:bold;">
            SmartPharm
</span>
 
    </a>
 
</div>



<div>




<span class="icon-btn">
 Welcome {{ request.user.username }}
</span>
<a href="/profile" class="icon-btn"><i class="bi bi-person-circle"></i> Profile</a>

<a href="/cart" class="icon-btn"><i class="bi bi-cart4"></i> Cart</a>

<a href="/logout/" class="icon-btn"><i class="bi bi-box-arrow-right"></i> Logout</a>

</div>

</div>


<!-- SECOND MENU -->
<div class="menu-bar">

<a href="{% url 'dashboard' %}">Home</a>

<a href="/medications">Shop</a>

<a href="/cart">Cart</a>

<a href="/my-orders">My Orders</a>

<a href="/ai-checker" class="icon-btn"><i class="bi bi-robot"></i></a>

</div>


<div class="container">

<!--    
{% if messages %}
  {% for message in messages %}
    <div class="alert alert-success text-center mt-3">
      {{ message }}
    </div>
  {% endfor %}
{% endif %}
-->

{% block content %}
{% endblock %}

</div>

</body>
</html>
