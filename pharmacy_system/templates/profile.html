{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<h3>My Profile</h3>

<form method="POST">
    {% csrf_token %}

    <label>Username</label>
    <input type="text" name="username" value="{{ user.username }}" class="form-control mb-2">

    <label>Email</label>
    <input type="email" name="email" value="{{ user.email }}" class="form-control mb-2">

    <label>First Name</label>
    <input type="text" name="first_name" value="{{ user.first_name }}" class="form-control mb-2">

    <label>Last Name</label>
    <input type="text" name="last_name" value="{{ user.last_name }}" class="form-control mb-3">

    <button class="btn btn-primary w-100">
        Update Profile
    </button>

</form>

</div>

{% endblock %}
